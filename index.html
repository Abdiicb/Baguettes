<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Realiza tu Pedido de Baguettes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Realiza tu Pedido de Baguettes</h1>
 <div class="contenedor">
    <form id="formulario-baguette">
        
        <label for="especialidad">Especialidad:</label>
        <select id="especialidad" name="especialidad">
            <option value="80">Clásica $80.00 MXN</option>
            <option value="120">Hawaiana $120.00 MXN</option>
            <option value="150">BBQ $150.00 MXN</option>
        </select>

        
        <p>Tipo de Pan:</p>
        <label><input type="radio" name="pan" value="0"> Clásico</label><br>
        <label><input type="radio" name="pan" value="20"> Con Ajonjolí (+20 MXN)</label><br>
        <label><input type="radio" name="pan" value="20"> Integral (+20 MXN)</label><br>
        <label><input type="radio" name="pan" value="50"> Brioche (+50 MXN)</label><br>

        
        <p>Ingredientes adicionales (5.00 MXN c/u):</p>
        <div class="ingredientes">
            <label><input type="checkbox" name="ingrediente" value="5"> Queso</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Lechuga</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Jitomate</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Cebolla</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Jalapeño</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Huevo</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Pepino</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Champiñones</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Tocino extra</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Doble Queso</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Piña</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Guacamole</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Salsa BBQ</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Aderezo Chipotle</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Mayonesa</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Mostaza</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Ketchup</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Pepperoni</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Arúcula</label>
            <label><input type="checkbox" name="ingrediente" value="5"> Cebolla Caramelizada</label>
        </div>

       
        <label for="cantidad">Cantidad de Baguettes:</label>
        <input type="number" id="cantidad" name="cantidad" value="1" min="1">

        
        <label><input type="checkbox" id="domicilio" value="30"> ¿Es a domicilio? (+$30 MXN)</label>

        
        <p id="total">Total: $0.00 MXN</p>
    </form>
 
    
    <div class="imagenes">
        <img src="IMG/baguette1.webp" alt="Baguette 1">
        <img src="IMG/baguette2.jfif" alt="Baguette 2">
        <img src="IMG/baguette3.jfif" alt="Baguette 3">
    </div>
 </div>
    <script src="java.js"></script>
</body>
</html>
